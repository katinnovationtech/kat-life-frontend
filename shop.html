<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - KAT LIFE</title>
    <link rel="stylesheet" href="css/grid.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/shop-styles.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <h1 class="hidden">Shop Kat Life</h1>

    <header id="main-header" class="full-width-grid-con">
        <input type="checkbox" id="hamburger">
        <label for="hamburger" id="ham-burger">
            <img src="images/ham-burger-menu.svg" alt="Menu">
        </label>
        <div id="logo" class="col-start-1 col-end-2">
            <img src="images/KatLifeLogo.png" alt="Logo">
        </div>
        <div id="main-nav" class="m-col-start-2 m-col-end-13 l-col-end-12">
            <nav class="burger-con">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="signin.html">Sign In</a></li>
                </ul>
            </nav>
        </div>
        <div class="header-icons col-start-4 col-end-5 m-col-start-11 m-col-end-13 l-col-start-10 l-col-end-12">
            <a href="#"><i class="fa-solid fa-magnifying-glass"></i></a>
            <a href="cart.html"><i class="fa-solid fa-bag-shopping"></i><span id="cart-count">0</span></a>
        </div>
    </header>

    <main style="margin-top: 90px;">
        <section class="about-hero">
            <div class="grid-con">
                <div class="col-span-full">
                    <p style="text-align: center; letter-spacing: 2px; font-size: 14px;">OSTAYA™ COLLECTION</p>
                    <h2>Shop Kat Life</h2>
                    <p style="text-align: center; max-width: 800px; margin: 20px auto;">
                        Your smart, wearable clothing designed to promote bone vitality and postural alignment using gentle, non-invasive electrical stimulation.
                    </p>
                </div>
            </div>
        </section>

        <section class="grid-con" style="margin-bottom: 40px;">
            <div class="col-span-full" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; padding-bottom: 20px;">
                <div>
                    <select id="filter-type" class="view-products" style="background: white; color: black; border: 1px solid #789b9b;">
                        <option value="all">All Products</option>
                        <option value="shorts">Shorts</option>
                        <option value="leggings">Leggings</option>
                    </select>
                </div>
                <div>
                    <label for="sort-by">Sort by: </label>
                    <select id="sort-by" style="padding: 5px;">
                        <option value="default">Featured</option>
                        <option value="name-asc">Name: A–Z</option>
                        <option value="name-desc">Name: Z–A</option>
                        <option value="price-asc">Price: Low–High</option>
                        <option value="price-desc">Price: High–Low</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="grid-con" id="product-grid">
            <div class="col-span-full" id="shop-status">Loading products...</div>
        </section>
    </main>

    <footer id="main-footer">
        <div id="footer-inner">
            <div id="footer-logo"><img src="images/KatLifeLogo.png" alt="Logo"></div>
            <div id="footer-about">
                <h3>About</h3>
                <ul><li><a href="about.html">Our Story</a></li></ul>
            </div>
            <div id="footer-newsletter">
                <h3>Newsletter</h3>
                <form><input type="email" placeholder="Email Address" id="footer-subscribe-bar"><button>Subscribe</button></form>
            </div>
        </div>
    </footer>

    <script>
        const SIZES = ['XS', 'S', 'M', 'L', 'XL'];

        const allProducts = [
            {
                base_product: 1,
                name: "OSTAYA™ Core Short",
                product_type_slug: "shorts",
                variants: [{ id: "v1", color: "Navy Blue", price: 129.00, image_url: "images/black_200.png" }]
            },
            {
                base_product: 2,
                name: "ARRO Shirt",
                product_type_slug: "leggings",
                variants: [{ id: "v2", color: "Black", price: 149.00, image_url: "images/blue_400.png" }]
            },
            {
                base_product: 3,
                name: "CURVA Shorts",
                product_type_slug: "shorts",
                variants: [{ id: "v3", color: "Black", price: 149.00, image_url: "images/white_400.png" }]
            }
        ];

        function getSessionId() {
            let id = localStorage.getItem('cartSessionId');
            if (!id) {
                id = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2);
                localStorage.setItem('cartSessionId', id);
            }
            return id;
        }

        function addToCart(variantId, size, color) {
            // Swap this alert for a real API call when your backend is ready
            alert(`Added ${size} (${color}) to bag!`);

            // --- Uncomment below when your API is ready ---
            // const API_URL = 'YOUR_API_URL_HERE';
            // fetch(`${API_URL}/api/cart`, {
            //     method: 'POST',
            //     headers: { 'Content-Type': 'application/json' },
            //     body: JSON.stringify({ session_id: getSessionId(), product_id: variantId, size, color, quantity: 1 }),
            // })
            // .then(r => r.json())
            // .then(data => { if (data.success) alert('Added to bag!'); })
            // .catch(() => alert('Error adding to bag'));
        }

        function renderProducts(products) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';

            if (products.length === 0) {
                grid.innerHTML = '<p class="col-span-full">No products found.</p>';
                return;
            }

            products.forEach(product => {
                const variant = product.variants[0];
                const card = document.createElement('div');
                card.className = 'col-span-full m-col-span-4 product-card';
                card.innerHTML = `
                    <div class="img-container" onclick="window.location.href='items.html?id=${variant.id}'" style="cursor:pointer;">
                        <img src="${variant.image_url}" alt="${product.name}">
                        <div class="quick-add-overlay">
                            <p>QUICK ADD</p>
                            <div class="size-btns">
                                ${SIZES.map(s => `<button onclick="event.stopPropagation(); addToCart('${variant.id}', '${s}', '${variant.color}')">${s}</button>`).join('')}
                            </div>
                        </div>
                    </div>
                    <p>${product.name}</p>
                    <span>CAD$ ${variant.price.toFixed(2)}</span>
                    <br>
                    <button class="view-products" onclick="window.location.href='items.html?id=${variant.id}'">View Details</button>
                `;
                grid.appendChild(card);
            });
        }

        document.getElementById('filter-type').addEventListener('change', (e) => {
            const filtered = e.target.value === 'all'
                ? allProducts
                : allProducts.filter(p => p.product_type_slug === e.target.value);
            renderProducts(filtered);
        });

        document.getElementById('sort-by').addEventListener('change', (e) => {
            const val = e.target.value;
            const sorted = [...allProducts].sort((a, b) => {
                const pA = a.variants[0].price, pB = b.variants[0].price;
                if (val === 'price-asc') return pA - pB;
                if (val === 'price-desc') return pB - pA;
                if (val === 'name-asc') return a.name.localeCompare(b.name);
                if (val === 'name-desc') return b.name.localeCompare(a.name);
                return 0;
            });
            renderProducts(sorted);
        });

        document.addEventListener('DOMContentLoaded', () => renderProducts(allProducts));
    </script>

    <style>
        .img-container {
            position: relative;
            overflow: hidden;
        }
        .img-container img {
            width: 100%;
            height: auto;
            display: block;
        }
        .img-container:hover .quick-add-overlay {
            opacity: 1;
            bottom: 0;
        }
        .quick-add-overlay {
            position: absolute;
            bottom: -60px;
            left: 0;
            width: 100%;
            background: rgba(255,255,255,0.9);
            transition: all 0.3s ease;
            opacity: 0;
            padding: 10px 0;
            text-align: center;
        }
        .quick-add-overlay p {
            margin: 0 0 6px;
            font-size: 12px;
            letter-spacing: 1px;
        }
        .size-btns button {
            background: none;
            border: 1px solid #789b9b;
            color: #789b9b;
            margin: 2px;
            padding: 5px 8px;
            cursor: pointer;
        }
        .size-btns button:hover {
            background: #789b9b;
            color: white;
        }
    </style>
</body>
</html>
